name: Sync fork with upstream

on:
  schedule:
    - cron: '0 6 * * 1'   # every Monday 06:00 UTC
  workflow_dispatch: {}     # lets you trigger it manually from GitHub's UI too

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream and merge
        run: |
          git remote add upstream https://github.com/usetrmnl/byos_fastapi.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          git push origin main
